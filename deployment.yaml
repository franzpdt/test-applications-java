---
# project-api Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: project-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: project-api
  template:
    metadata:
      labels:
        app: project-api
        dynatrace.com/deployment-project-api-label: label-project-api-deployment-value
        metadata.dynatrace.com/deployment-project-api-label-metadata: label-project-api-deployment-metadata-value
        deployment-project-api-label: label-project-api-deployment-value
        dynatrace.com/primary_tags.deployment-project-api-label: label-project-api-deployment-value
        metadata.dynatrace.com/primary_tags.deployment-project-api-label-metadata: label-project-api-deployment-metadata-value
        metadata.dynatrace.com/primary_tags.source: label-project-api-deployment-value
        primary_tags.deployment-label: label-project-api-deployment-value
      annotations:
        dynatrace.com/deployment-annotation: annotation-project-api-deployment-value
        metadata.dynatrace.com/deployment-annotation-metadata: annotation-project-api-deployment-metadata-value
        deployment-annotation: annotation-project-api-deployment-value
        dynatrace.com/primary_tags.deployment-annotation: annotation-project-api-deployment-value
        metadata.dynatrace.com/primary_tags.deployment-annotation-metadata: annotation-project-api-deployment-metadata-value
        metadata.dynatrace.com/primary_tags.source: annotation-project-api-deployment-value
        primary_tags.deployment-annotation: annotation-project-api-deployment-value
    spec:
      containers:
        - name: project-api
          image: localhost:32000/test-applications-java:1.2.0
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          env:
            - name: APP_PORT
              value: "5000"
            - name: APP_LOG_PATH
              value: /app/logs
          readinessProbe:
            httpGet:
              path: /api/projects
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/projects
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 30
          volumeMounts:
            - name: logs
              mountPath: /app/logs
      volumes:
        - name: logs
          emptyDir: {}
---
# project-api Service
apiVersion: v1
kind: Service
metadata:
  name: project-api
  labels:
    dynatrace.com/service-project-api-label: label-project-api-service-value
    metadata.dynatrace.com/service-project-api-label-metadata: label-project-api-service-metadata-value
    service-project-api-label: label-project-api-service-value
    dynatrace.com/primary_tags.service-project-api-label: label-project-api-service-value
    metadata.dynatrace.com/primary_tags.service-project-api-label-metadata: label-project-api-service-metadata-value
    metadata.dynatrace.com/primary_tags.source: label-project-api-service-value
    primary_tags.service-label: label-project-api-service-value
  annotations:
    dynatrace.com/service-annotation: annotation-project-api-service-value
    metadata.dynatrace.com/service-annotation-metadata: annotation-project-api-service-metadata-value
    service-annotation: annotation-project-api-service-value
    dynatrace.com/primary_tags.service-annotation: annotation-project-api-service-value
    metadata.dynatrace.com/primary_tags.service-annotation-metadata: annotation-project-api-service-metadata-value
    metadata.dynatrace.com/primary_tags.source: annotation-project-api-service-value
    primary_tags.service-annotation: annotation-project-api-service-value
spec:
  type: ClusterIP
  selector:
    app: project-api
  ports:
    - port: 80
      targetPort: 5000
---
# project-api-caller Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: project-api-caller
spec:
  replicas: 1
  selector:
    matchLabels:
      app: project-api-caller
  template:
    metadata:
      labels:
        app: project-api-caller
        dynatrace.com/deployment-project-api-caller-label: label-project-api-caller-deployment-value
        metadata.dynatrace.com/deployment-project-api-caller-label-metadata: label-project-api-caller-deployment-metadata-value
        deployment-project-api-caller-label: label-project-api-caller-deployment-value
        dynatrace.com/primary_tags.deployment-project-api-caller-label: label-project-api-caller-deployment-value
        metadata.dynatrace.com/primary_tags.deployment-project-api-caller-label-metadata: label-project-api-caller-deployment-metadata-value
        primary_tags.deployment-project-api-caller-label: label-project-api-caller-deployment-value
      annotations:
        dynatrace.com/deployment-annotation: annotation-project-api-caller-deployment-value
        metadata.dynatrace.com/deployment-annotation-metadata: annotation-project-api-caller-deployment-metadata-value
        deployment-annotation: annotation-project-api-caller-deployment-value
        dynatrace.com/primary_tags.deployment-annotation: annotation-project-api-caller-deployment-value
        metadata.dynatrace.com/primary_tags.deployment-annotation-metadata: annotation-project-api-caller-deployment-metadata-value
        metadata.dynatrace.com/primary_tags.source: annotation-project-api-caller-deployment-value
        primary_tags.deployment-annotation: annotation-project-api-caller-deployment-value
    spec:
      containers:
        - name: project-api-caller
          image: localhost:32000/test-applications-java-caller:1.0.0
          imagePullPolicy: Always
          env:
            - name: BASE_URL
              value: http://project-api
